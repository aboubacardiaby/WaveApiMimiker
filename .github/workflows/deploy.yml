name: CI / CD → GCP Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Prevent two deploys running at the same time on the same branch
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  SERVICE:    wave-api-mimiker
  REGISTRY:   us-central1-docker.pkg.dev
  PROJECT:    kalipeh
  REPO:       wave-api-mimiker
  IMAGE_NAME: wave-api-mimiker

jobs:
  # ── Job 1: Build + verify migrations ────────────────────────────────────────
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore WaveApiMimiker/WaveApiMimiker.csproj

      - name: Build (Release)
        run: dotnet build WaveApiMimiker/WaveApiMimiker.csproj -c Release --no-restore

      - name: Install EF Core CLI
        run: dotnet tool install --global dotnet-ef --version 9.0.4

      # Generates idempotent SQL from the migration files — no live DB needed.
      # Fails the build if the model snapshot is out of sync with the migrations.
      - name: Verify EF migrations compile cleanly
        working-directory: WaveApiMimiker
        run: dotnet ef migrations script --idempotent --output /dev/null --configuration Release --no-build

  # ── Job 2: Docker build + push + Cloud Run deploy (main only) ───────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Authenticate to GCP via Workload Identity Federation ─────────────────
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/525776555218/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "kalipeh-svc-sa@kalipeh.iam.gserviceaccount.com"

      # ── Compute full image path (secrets not available in top-level env) ──────
      - name: Set image variables
        id: vars
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.REPO }}/${{ env.IMAGE_NAME }}"
          echo "image=${IMAGE}"                        >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE}:${{ github.sha }}"  >> $GITHUB_OUTPUT

      # ── Configure Docker for Artifact Registry ────────────────────────────────
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # ── Build & push image ────────────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.vars.outputs.image_tag }} \
            -t ${{ steps.vars.outputs.image }}:latest \
            ./WaveApiMimiker

      - name: Push Docker image
        run: |
          docker push ${{ steps.vars.outputs.image_tag }}
          docker push ${{ steps.vars.outputs.image }}:latest

      # ── Deploy to Cloud Run ───────────────────────────────────────────────────
      # The app runs db.MigrateAsync() + DataSeeder.SeedAsync() on startup,
      # so Cloud Run needs enough time to complete the DB migration before
      # the health check fires — hence the 120 s startup CPU boost.
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region:  us-central1
          image:   ${{ steps.vars.outputs.image_tag }}
          flags: >-
            --allow-unauthenticated
            --port=8080
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=10
            --timeout=60
            --cpu-boost
          env_vars: |
            ASPNETCORE_ENVIRONMENT=Production
            Jwt__Key=${{ secrets.JWT_KEY }}
            Jwt__Issuer=WaveApiMimiker
            Jwt__Audience=WaveApiMimiker
            ConnectionStrings__DefaultConnection=${{ secrets.DATABASE_URL }}

      - name: Show deployed URL
        run: echo "✓ Deployed → ${{ steps.deploy.outputs.url }}"
