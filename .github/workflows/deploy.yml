name: CI / CD → GCP Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}          # e.g. europe-west1
  SERVICE: wave-api-mimiker                   # Cloud Run service name
  REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev
  IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/wave-api-mimiker

jobs:
  # ── Job 1: Build & test ─────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore WaveApiMimiker/WaveApiMimiker.csproj

      - name: Build
        run: dotnet build WaveApiMimiker/WaveApiMimiker.csproj -c Release --no-restore

  # ── Job 2: Docker build + push + Cloud Run deploy (main branch only) ─────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Authenticate to GCP via Workload Identity Federation ───────────────
      # No long-lived key stored in GitHub — GitHub's OIDC token is exchanged
      # for short-lived GCP credentials at runtime.
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
           workload_identity_provider: "projects/525776555218/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
           service_account: "kalipeh-svc-sa@kalipeh.iam.gserviceaccount.com"

      # ── Configure Docker to push to Artifact Registry ─────────────────────
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # ── Build & push image ─────────────────────────────────────────────────
      - name: Set image tag
        id: tag
        run: echo "value=${{ env.IMAGE }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.tag.outputs.value }} \
            -t ${{ env.IMAGE }}:latest \
            ./WaveApiMimiker

      - name: Push Docker image
        run: |
          docker push ${{ steps.tag.outputs.value }}
          docker push ${{ env.IMAGE }}:latest

      # ── Deploy to Cloud Run ────────────────────────────────────────────────
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ secrets.GCP_REGION }}
          image: ${{ steps.tag.outputs.value }}
          flags: >-
            --allow-unauthenticated
            --port=8080
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=10
            --set-env-vars=ASPNETCORE_ENVIRONMENT=Production
          env_vars: |
            Jwt__Key=${{ secrets.JWT_KEY }}
            Jwt__Issuer=WaveApiMimiker
            Jwt__Audience=WaveApiMimiker

      - name: Show service URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
