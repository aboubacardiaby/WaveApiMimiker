name: CI / CD → GCP Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SERVICE: wave-api-mimiker   # Cloud Run service name

jobs:
  # ── Job 1: Build ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore WaveApiMimiker/WaveApiMimiker.csproj

      - name: Build
        run: dotnet build WaveApiMimiker/WaveApiMimiker.csproj -c Release --no-restore

  # ── Job 2: Docker build + push + Cloud Run deploy (main branch only) ─────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Authenticate to GCP via Workload Identity Federation ─────────────────
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/525776555218/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "kalipeh-svc-sa@kalipeh.iam.gserviceaccount.com"

      # ── Compute image name from secrets (secrets are only available in steps) ─
      - name: Set image variables
        id: vars
        run: |
          REGISTRY="us-central1-docker.pkg.dev"
          IMAGE="${REGISTRY}/kalipeh/wave-api-mimiker"
          echo "registry=${REGISTRY}"              >> $GITHUB_OUTPUT
          echo "image=${IMAGE}"                    >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE}:${{ github.sha }}" >> $GITHUB_OUTPUT

      # ── Configure Docker for Artifact Registry ────────────────────────────────
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ steps.vars.outputs.registry }} --quiet

      # ── Build & push image ────────────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.vars.outputs.image_tag }} \
            -t ${{ steps.vars.outputs.image }}:latest \
            ./WaveApiMimiker

      - name: Push Docker image
        run: |
          docker push ${{ steps.vars.outputs.image_tag }}
          docker push ${{ steps.vars.outputs.image }}:latest

      # ── Deploy to Cloud Run ───────────────────────────────────────────────────
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ secrets.GCP_REGION }}
          image: ${{ steps.vars.outputs.image_tag }}
          flags: >-
            --allow-unauthenticated
            --port=8080
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=10
          env_vars: |
            ASPNETCORE_ENVIRONMENT=Production
            Jwt__Key=${{ secrets.JWT_KEY }}
            Jwt__Issuer=WaveApiMimiker
            Jwt__Audience=WaveApiMimiker

      - name: Show service URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
